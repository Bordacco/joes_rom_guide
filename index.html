<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joes Rom-guide — Adgangsprøve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --parchment: #ede4cc;
    --dark-ink: #2a1f0e;
    --terracotta: #b5451b;
    --rust: #8b3a1a;
    --gold: #c9922a;
    --faded: #7a6a52;
    --light-faded: #a89880;
    --border: #c8b89a;
    --card-bg: #faf6ee;
    --green: #3a5c3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    color: var(--dark-ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8b89a' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .stage {
    width: 100%;
    max-width: 680px;
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .stage.active { display: flex; }

  /* ─── ORNAMENTS ─── */
  .ornament {
    color: var(--terracotta);
    font-size: 1.4rem;
    letter-spacing: 0.4em;
    margin-bottom: 0.75rem;
    text-align: center;
  }

  .rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    margin: 1rem 0;
  }
  .rule::before, .rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .rule span { color: var(--terracotta); font-size: 1rem; }

  /* ─── TITLES ─── */
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 700;
    line-height: 0.95;
    color: var(--dark-ink);
    text-align: center;
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
  }
  h1 em { font-style: italic; color: var(--terracotta); }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 700;
    text-align: center;
    color: var(--dark-ink);
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-style: italic;
    color: var(--faded);
    text-align: center;
    font-size: 1.05rem;
    margin-bottom: 1.5rem;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 2rem 2.5rem;
    width: 100%;
    margin-top: 1rem;
  }

  /* ─── INTRO TEXT ─── */
  .intro-body {
    font-size: 1.05rem;
    color: var(--dark-ink);
    line-height: 1.9;
    text-align: center;
  }

  .btn-primary {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 0.75rem 2.5rem;
    background: var(--dark-ink);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--terracotta); }

  /* ─── PROGRESS ─── */
  .progress-bar {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .progress-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .progress-dot.done { background: var(--green); }
  .progress-dot.current { background: var(--terracotta); }

  /* ─── CATEGORY BADGE ─── */
  .category-badge {
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    color: var(--terracotta);
    border: 1px solid var(--terracotta);
    padding: 0.2rem 0.75rem;
    display: inline-block;
    margin-bottom: 1rem;
    text-align: center;
  }

  /* ─── QUESTION ─── */
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.35rem);
    font-weight: 400;
    color: var(--dark-ink);
    margin-bottom: 1.5rem;
    line-height: 1.5;
    text-align: center;
    font-style: italic;
  }

  /* ─── ANSWERS ─── */
  .answers {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .answer-btn {
    background: transparent;
    border: 1px solid var(--border);
    padding: 0.85rem 1.25rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--dark-ink);
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .answer-btn:hover:not(:disabled) {
    background: var(--parchment);
    border-color: var(--faded);
  }
  .answer-btn.correct {
    background: #eaf3de;
    border-color: #7aad5a;
    color: #3a6622;
  }
  .answer-btn.wrong {
    background: #fde8c8;
    border-color: #e8a043;
    color: #6b3a0f;
    font-style: italic;
  }
  .answer-btn:disabled { cursor: default; }

  /* ─── FEEDBACK ─── */
  .feedback-box {
    margin-top: 1.25rem;
    padding: 1rem 1.25rem;
    border-left: 3px solid var(--terracotta);
    background: #faf6ee;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--faded);
    display: none;
  }
  .feedback-box.visible { display: block; }

  /* Correct: warm golden glow */
  .feedback-box.correct-fb {
    border-left: 4px solid #7aad5a;
    background: #f4faed;
    color: #3a6622;
    font-size: 1.05rem;
    font-style: italic;
    font-weight: 600;
  }

  /* Wrong: bright, warm, encouraging — not punishing */
  .feedback-box.wrong-fb {
    border: none;
    border-radius: 2px;
    background: linear-gradient(135deg, #fff4e0 0%, #fde8c8 100%);
    color: #6b3a0f;
    padding: 1.4rem 1.75rem;
    margin-top: 1.5rem;
    position: relative;
    font-style: normal;
    font-size: 1.05rem;
    line-height: 1.85;
    box-shadow: 0 2px 12px rgba(197, 120, 30, 0.18);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .feedback-box.wrong-fb::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(to right, #e8a043, transparent);
    margin-top: 1rem;
  }

  /* Near miss: picked a real Roman pasta in the fire question */
  .feedback-box.nearmiss-fb {
    border: none;
    border-radius: 2px;
    background: linear-gradient(135deg, #e8f4fd 0%, #cde8f7 100%);
    color: #1a4a6b;
    padding: 1.4rem 1.75rem;
    margin-top: 1.5rem;
    position: relative;
    font-style: normal;
    font-size: 1.05rem;
    line-height: 1.85;
    box-shadow: 0 2px 12px rgba(30, 100, 180, 0.13);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .feedback-box.nearmiss-fb::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(to right, #5aaad4, transparent);
    margin-top: 1rem;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .continue-btn {
    display: none;
    margin-top: 1.25rem;
    align-self: flex-end;
    padding: 0.6rem 1.75rem;
    background: var(--dark-ink);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  .continue-btn:hover { background: var(--terracotta); }
  .continue-btn.visible { display: inline-block; }

  /* ─── OUTCOME ─── */
  .outcome-icon {
    font-size: 3rem;
    text-align: center;
    margin-bottom: 1rem;
  }

  .outcome-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
    font-style: italic;
    color: var(--terracotta);
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .outcome-title.success { color: var(--green); }

  .outcome-text {
    font-size: 1.05rem;
    color: var(--dark-ink);
    text-align: center;
    line-height: 1.9;
  }

  /* ─── TIMER ─── */
  .timer-display {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    color: var(--terracotta);
    text-align: center;
    margin: 1rem 0;
    letter-spacing: 0.05em;
  }

  .timer-label {
    font-style: italic;
    color: var(--faded);
    text-align: center;
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }

  /* ─── ENTER BTN ─── */
  .enter-btn {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 1rem 3rem;
    background: var(--green);
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .enter-btn:hover { background: var(--rust); background: #2d4a2d; }

  @media (max-width: 500px) {
    .card { padding: 1.5rem 1.25rem; }
  }

  /* ─── DEBUG PANEL ─── */
  #debug-panel {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 360px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 0.76rem;
    padding: 1rem 1rem 2rem;
    z-index: 9999;
    border-left: 2px solid #b5451b;
    overflow-y: auto;
    box-shadow: -4px 0 20px rgba(0,0,0,0.4);
  }
  #debug-panel.visible { display: block; }
  #debug-panel h4 {
    color: #c9922a;
    margin-bottom: 0.75rem;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    position: sticky;
    top: 0;
    background: #1a1a2e;
    padding: 0.5rem 0;
    border-bottom: 1px solid #333;
    margin-top: 0;
  }
  #debug-panel .debug-section {
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #2a2a40;
  }
  #debug-panel .debug-section-title {
    color: #b5451b;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    margin-top: 0.75rem;
  }
  #debug-panel .debug-q { margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #252535; }
  #debug-panel .debug-q:last-child { border-bottom: none; }
  #debug-panel .label { color: #888; display: block; margin-top: 0.3rem; }
  #debug-panel .val-correct { color: #7ec87e; }
  #debug-panel .val-nearmiss { color: #7ec8e0; }
  #debug-panel .val-wrong { color: #e07070; }
  #debug-panel .val { color: #ddd; }
  #debug-panel .swatch-row {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem;
  }
  #debug-panel .swatch {
    padding: 0.3rem 0.6rem;
    font-size: 0.7rem;
    border-radius: 2px;
  }
  #debug-badge {
    display: none;
    position: fixed;
    top: 0.5rem; right: 370px;
    background: #b5451b;
    color: #fff;
    font-family: monospace;
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    z-index: 9999;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  #debug-badge.visible { display: block; }
  /* Push page content left when panel is open so nothing is hidden behind it */
  body.debug-open { padding-right: 360px; }
  .debug-skip-btn {
    display: none;
    background: #c9922a;
    color: #fff;
    border: none;
    font-family: monospace;
    font-size: 0.75rem;
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    margin-left: 1rem;
  }
  .debug-skip-btn.visible { display: inline-block; }
  .btn-locked { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     STAGE 0: INTRO
══════════════════════════════════════════ -->
<div class="stage active" id="stage-intro">
  <div class="ornament">✦ ✦ ✦</div>
  <h1><em>Joes</em><br>Rom-guide</h1>
  <div class="rule"><span>✦</span></div>
  <div class="card">
    <p class="intro-body" id="intro-text"></p>
    <div style="text-align:center;">
      <button class="btn-primary" onclick="startQuiz()">Test din værdighed →</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     STAGE 1–3: QUESTIONS
══════════════════════════════════════════ -->
<div class="stage" id="stage-question">
  <div class="ornament">✦ ✦ ✦</div>
  <h2>Adgangsprøven</h2>
  <div class="subtitle" id="q-subtitle">Spørgsmål 1 af 3</div>

  <div class="progress-bar" id="progress-bar">
    <div class="progress-dot current" id="dot-0"></div>
    <div class="progress-dot" id="dot-1"></div>
    <div class="progress-dot" id="dot-2"></div>
  </div>

  <div class="card" style="display:flex;flex-direction:column;">
    <div style="text-align:center;">
      <span class="category-badge" id="q-category">Pasta</span>
    </div>
    <p class="question-text" id="q-text"></p>
    <div class="answers" id="q-answers"></div>
    <div class="feedback-box" id="q-feedback"></div>
    <button class="continue-btn" id="continue-btn" onclick="nextQuestion()">Videre →</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     STAGE 4: SUCCESS
══════════════════════════════════════════ -->
<div class="stage" id="stage-success">
  <div class="ornament">✦ ✦ ✦</div>
  <div class="outcome-icon">🏛️</div>
  <div class="outcome-title success" id="success-title">DAJE!</div>
  <div class="rule"><span>✦</span></div>
  <div class="card">
    <p class="outcome-text" id="success-text"></p>
    <div style="text-align:center;">
      <!-- Replace href with your actual guide page when ready -->
      <a class="enter-btn" href="guide.html">Træd ind i Rom →</a>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     STAGE 5: FAILURE
══════════════════════════════════════════ -->
<div class="stage" id="stage-fail">
  <div class="ornament">✦ ✦ ✦</div>
  <div class="outcome-icon">⚔️</div>
  <div class="outcome-title" id="fail-title">Infamis!</div>
  <div class="rule"><span>✦</span></div>
  <div class="card">
    <p class="outcome-text" id="fail-text"></p>
    <div class="timer-label" style="text-align:center;margin-top:1.5rem">Estimeret ventetid inden næste forsøg:</div>
    <div class="timer-display" id="timer-display"></div>
    <div class="timer-label" style="text-align:center;font-size:0.75rem;margin-top:-0.5rem">* Baseret på romersk tidsregning</div>
    <div style="text-align:center;margin-top:1.5rem">
      <button class="btn-primary btn-locked" id="retry-btn" onclick="retryQuiz()">Forsøg igen →</button>
    </div>
  </div>
</div>

<!-- ─── DEBUG PANEL ─── -->
<div id="debug-badge">🛠 DEBUG MODE</div>
<div id="debug-panel">
  <h4>🛠 DEBUG MODE &nbsp;<span style="color:#aaa;font-weight:normal;font-size:0.72rem;">Press D again to hide · Timer disabled · Questions logged below</span></h4>
  <div id="debug-content"></div>
</div>

<script>
// ══════════════════════════════════════════
//  DATA FROM SPREADSHEETS
// ══════════════════════════════════════════

const INTRO_TEXT = "Inden du får adgang til Rom-guiden, skal du svare rigtigt på tre spørgsmål for at bevise din værdighed. Du vil blive quizzet i kategorierne pasta, fodbold og La Dolce Vita. For at hjælpe dig lidt på vej får du denne ledetråd. Svarene er det tætteste, som subjektive holdninger kan komme på en objektiv sandhed. Med det i baghoved er du klar til at krydse Rubicon og vise din værdighed.";

const SUCCESS_TEMPLATE = "Terningen er kastet og [aktør] har talt. De har fundet dig værdig. Du har nu adgang til Rom-guiden.";
const FAIL_TEMPLATE = "Terningen er kastet og [aktør] har talt. Du er ikke værdig til at få adgang til Rom-guiden. Du er derfor dømt til at vente [begivenhed], inden du kan prøve igen. Heldigvis er italienere ikke så gode til at overholde tiden, så du kan måske forsøge igen om lidt.";

const AKTØRER = ["Konsulerne", "Det første Triumvirat", "Det andet Triumvirat", "Senatet", "Tribunalet", "Vestalinderne", "Prætorianergarden", "Pontifikalkollegiet", "Censorerne", "Ædilerne", "Augurerne"];
const BEGIVENHEDER = [
  "til Italien kvalificerer sig til VM igen",
  "lige så længe som det tager at få en godkendelse i det italienske bureaukrati",
  "indtil Roma finder en værdig arvtager til 10-tallet",
  "til trafikken på Il Raccordo begynder at køre igen",
  "et sted mellem 12 sekunder og 80 år"
];

const PASTA_INGREDIENSER = [
  { q: "Skal der fløde i carbonara?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej selvfølgelig skal der ikke fløde i carbonara, men der findes mange andre lækre pastaretter med fløde i fx Tagliatelle al salmone e panna." },
  { q: "Skal der ærter i carbonara?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej selvfølgelig skal der ikke ærter i carbonara, men der findes mange andre lækre pastaretter med ærter i fx Pasta e piselli alla Napolitana." },
  { q: "Skal der persille på carbonara?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej selvfølgelig skal der ikke persille på carbonara, men hvis du insisterer på at drysse persille ud over din pasta, så vil jeg anbefale at gøre det over en lækker omgang aglio, olio e peperoncino." },
  { q: "Skal der pancetta i carbonara?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej det skal der ikke, men det kan gå an, hvis du ikke kan finde guanciale." },
  { q: "Skal der bacon i carbonara?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej det skal der ikke, men det kan gå an i yderste nødstilfælde, hvis du hverken kan finde pancetta eller guanciale." },
  { q: "Skal der hvidløg i amatriciana?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej det skal der ikke... med mindre du vil sætte al din ære og integritet over styr og starte en national shit storm, som ender med, at Amatrices borgermester sender dig en skrivelse med den rigtige opskrift... og helt ærligt, så Amatrice har været nok igennem siden jordskælvet." },
  { q: "Kan man bruge spaghetti til amatriciana?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej det skal man ikke, men det kan gå an, hvis du ikke har bucatini." },
  { q: "Kan man bruge tagliatelle til carbonara?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej det kan man ikke, for det giver slet ikke mening at bruge en blød æggebaseret pastatype til en blød æggebaseret pastasauce." },
  { q: "Består en bolognese kun af tomat, løg, hvidløg og oksekød?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej det gør det ikke, og i øvrigt mener jeg, at der burde blive rejst en rigsretssag mod Mette Frederiksen for at være så skråsikker og påstå det." },
  { q: "Skal der kulør i en bolognese?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej for så bliver det en kødsovs, og det er en helt anden ret." },
  { q: "Skal der cocktailpølser i en bolognese?", a1: "Ja", a2: "Nej", correct: "Nej", svarTekst: "Nej!" },
];

// ── PASTA: De fire romerske pastaretter ──
// The question asks which pasta does NOT belong among the four classical ones.
// "Rigtig svar 1–4" = the four classical Roman pastas = WRONG answers to the question (they DO belong)
//   → Svartekst 1–4 = encouraging near-miss feedback when one of these is picked

//  QUIZ ENGINE
// ══════════════════════════════════════════

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function fillTemplate(tpl) {
  return tpl
    .replace('[aktør]', rand(AKTØRER))
    .replace('[begivenhed]', rand(BEGIVENHEDER));
}

// Build question set: 1 pasta, 1 football, 1 dolce vita
function buildQuestions() {
  const questions = [];

  // ── Q1: Pasta ──────────────────────────────────
  // Randomly pick between Ingredienser or De fire
  if (Math.random() < 0.5) {
    const q = rand(PASTA_INGREDIENSER);
    const opts = shuffle([
      { text: q.a1, isCorrect: q.a1 === q.correct },
      { text: q.a2, isCorrect: q.a2 === q.correct },
    ]);
    questions.push({
      category: "🍝 Pasta",
      type: "ingredienser",
      question: q.q,
      options: opts,
      correctAnswer: q.correct,
      svarTekst: q.svarTekst,
      countsForPass: true,
      passOnWrong: false, // wrong = show tekst then fail if counts
    });
  } else {
    // De fire — 3 random Roman pastas (wrong answers) + 1 random non-Roman pasta (correct answer)
    const threeRoman = pick(PASTA_FIRE.romanPastas, 3);
    const correctItem = rand(PASTA_FIRE.nonRomanPastas);
    const opts = shuffle([
      ...threeRoman.map(p => ({ text: p.text, isCorrect: false, svar: p.svar, isRoman: true })),
      { text: correctItem.text, isCorrect: true, svar: correctItem.svar, isRoman: false },
    ]);
    questions.push({
      category: "🍝 Pasta",
      type: "fire",
      question: PASTA_FIRE.q,
      options: opts,
      correctAnswer: correctItem.text,
      svarTekst: null,
      countsForPass: true,
      passOnWrong: false,
    });
  }

  // ── Q2: Football ──────────────────────────────
  // Randomly pick Hvor var Joe or Roma Legender
  if (Math.random() < 0.5) {
    const q = rand(HVOR_VAR_JOE);
    const opts = shuffle([
      { text: q.a1, isCorrect: q.a1 === q.correct },
      { text: q.a2, isCorrect: q.a2 === q.correct },
    ]);
    questions.push({
      category: "⚽ Fodbold",
      type: "joeQuestion",
      question: q.q,
      options: opts,
      correctAnswer: q.correct,
      svarTekst: null,
      countsForPass: false, // Hvor var Joe doesn't count!
      passOnWrong: true,
      funOnly: true,
    });
  } else {
    const q = rand(ROMA_LEGENDER);
    const others = q.pool.filter(x => x !== q.correct);
    const threeOthers = pick(others, 3);
    const opts = shuffle([
      ...threeOthers.map(t => ({ text: t, isCorrect: false })),
      { text: q.correct, isCorrect: true },
    ]);
    questions.push({
      category: "⚽ Fodbold",
      type: "legender",
      question: q.q,
      options: opts,
      correctAnswer: q.correct,
      svarTekst: null,
      countsForPass: true,
      passOnWrong: false,
    });
  }

  // ── Q3: La Dolce Vita ──────────────────────────
  const q = rand(KVALITET);
  const opts = shuffle([
    { text: q.a1, isCorrect: q.a1 === q.correct },
    { text: q.a2, isCorrect: q.a2 === q.correct },
  ]);
  questions.push({
    category: "☀️ La Dolce Vita",
    type: "kvalitet",
    question: q.q,
    options: opts,
    correctAnswer: q.correct,
    svarTekst: q.svarTekst,
    countsForPass: true,
    passOnWrong: false,
  });

  return questions;
}

// ── State ──
let questions = [];
let currentQ = 0;
let wrongCount = 0;
let timerInterval = null;
let fakeTimerInterval = null;
let canRetry = true;

function randomFakeTime() {
  function ri(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function toRoman(num) {
    const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
    const syms = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
    let result = '';
    for (let i = 0; i < vals.length; i++) {
      while (num >= vals[i]) { result += syms[i]; num -= vals[i]; }
    }
    return result;
  }
  const options = [
    () => `${ri(12, 59)} sekunder`,
    () => `${ri(1, 59)} minutter`,
    () => `${ri(1, 3)} timer og ${ri(1, 59)} minutter`,
    () => `${ri(1, 6)} dage`,
    () => `${ri(1, 6)} dage og ${ri(1, 23)} timer`,
    () => `${ri(2, 11)} måneder`,
    () => `${ri(1, 4)} år og ${ri(1, 11)} måneder`,
    () => `${ri(5, 20)} år`,
    () => `${ri(21, 50)} år`,
    () => `${ri(51, 80)} år`,
    () => `${ri(15, 80)} år og ${ri(1, 11)} måneder`,
  ];
  let timeStr = options[Math.floor(Math.random() * options.length)]();
  if (Math.random() < 0.25) {
    timeStr = timeStr.replace(/\d+/g, n => toRoman(parseInt(n)));
  }
  return timeStr;
}

function startFakeTimer() {
  const display = document.getElementById('timer-display');
  display.style.display = 'block';
  display.textContent = randomFakeTime();
  fakeTimerInterval = setInterval(() => {
    display.textContent = randomFakeTime();
  }, 5000);
}

function showStage(id) {
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  questions = buildQuestions();
  currentQ = 0;
  wrongCount = 0;
  showStage('stage-question');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];

  // Subtitle
  document.getElementById('q-subtitle').textContent = `Spørgsmål ${currentQ + 1} af 3`;

  // Progress dots
  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById(`dot-${i}`);
    dot.className = 'progress-dot';
    if (i < currentQ) dot.classList.add('done');
    else if (i === currentQ) dot.classList.add('current');
  }

  // Category & question — never reveal fun-only status
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.question;

  // Answers
  const container = document.getElementById('q-answers');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt.text;
    btn.onclick = () => handleAnswer(i);
    container.appendChild(btn);
  });

  // Reset feedback
  const fb = document.getElementById('q-feedback');
  fb.className = 'feedback-box';
  fb.textContent = '';
  document.getElementById('continue-btn').className = 'continue-btn';
}

function handleAnswer(optionIndex) {
  const q = questions[currentQ];
  const selected = q.options[optionIndex];
  const buttons = document.querySelectorAll('.answer-btn');
  const fb = document.getElementById('q-feedback');
  const cont = document.getElementById('continue-btn');

  // Disable all buttons
  buttons.forEach(b => b.disabled = true);

  // Fodbold (fun only): show colour but never counts towards pass
  if (q.funOnly) {
    buttons[optionIndex].classList.add(selected.isCorrect ? 'correct' : 'wrong');
    cont.className = 'continue-btn visible';
    return;
  }

  if (selected.isCorrect) {
    buttons[optionIndex].classList.add('correct');
    if (q.type === 'fire') {
      fb.className = 'feedback-box correct-fb visible';
      fb.textContent = selected.svar || '';
    }
  } else {
    buttons[optionIndex].classList.add('wrong');
    if (q.countsForPass) wrongCount++;

    let svarTekst = q.svarTekst || null;
    let isNearMiss = false;

    if (q.type === 'fire') {
      // svar and isRoman are stored directly on the option
      svarTekst = selected.svar || null;
      isNearMiss = selected.isRoman === true;
    }

    if (svarTekst) {
      fb.className = `feedback-box ${isNearMiss ? 'nearmiss-fb' : 'wrong-fb'} visible`;
      fb.textContent = svarTekst;
    }
  }

  cont.className = 'continue-btn visible';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 3) {
    endQuiz();
  } else {
    renderQuestion();
  }
}

function endQuiz() {
  // Only pasta and la dolce vita count — fodbold has countsForPass:false
  if (wrongCount === 0) {
    document.getElementById('success-text').textContent = fillTemplate(SUCCESS_TEMPLATE);
    showStage('stage-success');
  } else {
    document.getElementById('fail-text').textContent = fillTemplate(FAIL_TEMPLATE);
    showStage('stage-fail');
    // Random wait between 2 seconds and 5 minutes — hidden from user
    const randomSeconds = Math.floor(Math.random() * (300 - 2 + 1)) + 2;
    startTimer(randomSeconds);
  }
}

function startTimer(seconds) {
  const retryBtn = document.getElementById('retry-btn');
  canRetry = false;
  retryBtn.classList.add('btn-locked');

  if (debugMode) {
    canRetry = true;
    retryBtn.classList.remove('btn-locked');
    return;
  }

  startFakeTimer();
  setTimeout(() => {
    canRetry = true;
    retryBtn.classList.remove('btn-locked');
  }, seconds * 1000);
}

function retryQuiz() {
  if (!canRetry) {
    document.getElementById('timer-display').textContent = randomFakeTime();
    return;
  }
  clearInterval(fakeTimerInterval);
  fakeTimerInterval = null;
  startQuiz();
}

  questions.forEach((q, i) => {
    html += `<div class="debug-q">`;
    html += `<div><span class="val-correct">Q${i+1}</span> <span style="color:#c9922a">${q.category}</span> <span class="label" style="display:inline">[${q.type}${q.countsForPass ? '' : ' — tæller ikke'}]</span></div>`;
    html += `<div><span class="label">Spørgsmål:</span> <span class="val">${q.question}</span></div>`;

    if (q.type === 'fire') {
      const correctOpt = q.options.find(o => o.isCorrect);
      const romanOpts = q.options.filter(o => o.isRoman);
      html += `<div><span class="label">Korrekt svar (ikke-romersk):</span> <span class="val-correct">${correctOpt?.text}</span></div>`;
      html += `<div><span class="label">Feedback ved korrekt:</span> <span class="val">${correctOpt?.svar}</span></div>`;
      html += `<div><span class="label">Nær-miss (romerske pastaer vist):</span></div>`;
      romanOpts.forEach(o => {
        html += `<div style="margin-left:0.75rem"><span class="val-nearmiss">${o.text}</span> → <span class="val">${o.svar}</span></div>`;
      });
    } else {
      q.options.forEach(opt => {
        const cls = opt.isCorrect ? 'val-correct' : 'val-wrong';
        const label = opt.isCorrect ? '✓ Korrekt' : '✗ Forkert';
        html += `<div><span class="${cls}">${label}:</span> <span class="val">${opt.text}</span></div>`;
      });
      if (q.svarTekst) {
        html += `<div><span class="label">Forkert svar tekst:</span> <span style="color:#fde8c8">${q.svarTekst}</span></div>`;
      }
    }
    html += `</div>`;
  });

  container.innerHTML = html;
}

// Patch startQuiz to refresh debug panel
function startQuiz() {
  questions = buildQuestions();
  currentQ = 0;
  wrongCount = 0;
  showStage('stage-question');
  renderQuestion();
  if (debugMode) renderDebugPanel();
}

document.getElementById('intro-text').innerHTML =
  'Inden du får adgang til Rom-guiden, skal du svare rigtigt på tre spørgsmål for at bevise din værdighed. Du vil blive quizzet i kategorierne pasta, fodbold og La Dolce Vita. For at hjælpe dig lidt på vej får du denne ledetråd:' +
  '<br><br><em style="color:var(--terracotta);font-size:1.08em">Svarene er det tætteste, som subjektive holdninger kan komme på en objektiv sandhed.</em><br><br>' +
  'Med det i baghoved er du klar til at krydse Rubicon og vise din værdighed.';
</script>
